name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check (lint)
        run: npm run lint

      - name: DOM wiring smoke test
        run: npm run smoke

      - name: Verify static assets exist
        run: |
          test -f index.html
          test -f styles.css
          test -f src/main.js
          test -f src/settings.js
          test -f src/leaderboard.js
          test -f src/touch.js
